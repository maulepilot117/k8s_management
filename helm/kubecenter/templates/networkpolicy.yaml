{{- if .Values.networkPolicy.enabled }}
---
# Backend NetworkPolicy: allow ingress from frontend/ingress, allow egress to k8s API + DNS
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: {{ include "kubecenter.fullname" . }}-backend
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "kubecenter.labels" . | nindent 4 }}
spec:
  podSelector:
    matchLabels:
      {{- include "kubecenter.selectorLabels" . | nindent 6 }}
      app.kubernetes.io/component: backend
  policyTypes:
    - Ingress
    - Egress
  ingress:
    # Allow traffic from frontend pods in this namespace
    - from:
        - podSelector:
            matchLabels:
              {{- include "kubecenter.selectorLabels" . | nindent 14 }}
              app.kubernetes.io/component: frontend
      ports:
        - port: {{ .Values.backend.port }}
          protocol: TCP
    {{- if .Values.ingress.enabled }}
    # Allow traffic from ingress controller namespace
    # NOTE: For tighter security, restrict namespaceSelector to your ingress namespace
    - from:
        - namespaceSelector: {}
          podSelector: {}
      ports:
        - port: {{ .Values.backend.port }}
          protocol: TCP
    {{- end }}
  egress:
    # DNS resolution
    - ports:
        - port: 53
          protocol: UDP
        - port: 53
          protocol: TCP
    # PostgreSQL database
    - ports:
        - port: 5432
          protocol: TCP
    # Kubernetes API server (HTTPS), OIDC discovery, Prometheus, Grafana, Hubble Relay
    - ports:
        - port: 80
          protocol: TCP
        - port: 443
          protocol: TCP
        - port: 6443
          protocol: TCP
        - port: 9090
          protocol: TCP
        - port: 3000
          protocol: TCP
    {{- if .Values.auth.ldap }}
    # LDAP/LDAPS (only when LDAP providers are configured)
    - ports:
        - port: 389
          protocol: TCP
        - port: 636
          protocol: TCP
    {{- end }}
---
{{- if .Values.frontend.enabled }}
# Frontend NetworkPolicy: allow ingress from ingress controller, egress only to backend + DNS
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: {{ include "kubecenter.frontendFullname" . }}
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "kubecenter.labels" . | nindent 4 }}
spec:
  podSelector:
    matchLabels:
      {{- include "kubecenter.selectorLabels" . | nindent 6 }}
      app.kubernetes.io/component: frontend
  policyTypes:
    - Ingress
    - Egress
  ingress:
    - from: []
      ports:
        - port: {{ .Values.frontend.port }}
          protocol: TCP
  egress:
    # DNS resolution
    - ports:
        - port: 53
          protocol: UDP
        - port: 53
          protocol: TCP
    # Backend service only
    - to:
        - podSelector:
            matchLabels:
              {{- include "kubecenter.selectorLabels" . | nindent 14 }}
              app.kubernetes.io/component: backend
      ports:
        - port: {{ .Values.backend.port }}
          protocol: TCP
{{- end }}
{{- end }}
