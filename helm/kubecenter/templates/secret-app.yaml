apiVersion: v1
kind: Secret
metadata:
  name: {{ include "kubecenter.fullname" . }}
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "kubecenter.labels" . | nindent 4 }}
type: Opaque
data:
  {{- /* JWT secret: use provided value, or look up existing secret, or generate random */}}
  {{- if .Values.auth.jwtSecret }}
  jwt-secret: {{ .Values.auth.jwtSecret | b64enc | quote }}
  {{- else }}
  {{- $existingSecret := lookup "v1" "Secret" .Release.Namespace (include "kubecenter.fullname" .) }}
  {{- if and $existingSecret (index $existingSecret.data "jwt-secret") }}
  jwt-secret: {{ index $existingSecret.data "jwt-secret" }}
  {{- else }}
  jwt-secret: {{ randAlphaNum 64 | b64enc | quote }}
  {{- end }}
  {{- end }}
  {{- /* Database URL: constructed from subchart or external config */}}
  {{- if .Values.postgresql.enabled }}
  {{- $pgPass := required "postgresql.auth.password is required when postgresql.enabled=true" .Values.postgresql.auth.password }}
  database-url: {{ printf "postgresql://%s:%s@%s-postgresql:5432/%s?sslmode=disable&connect_timeout=5" .Values.postgresql.auth.username $pgPass .Release.Name .Values.postgresql.auth.database | b64enc | quote }}
  {{- else if .Values.externalDatabase.host }}
  {{- $extPass := required "externalDatabase.password is required when externalDatabase.host is set" .Values.externalDatabase.password }}
  database-url: {{ printf "postgresql://%s:%s@%s:%v/%s?sslmode=%s" .Values.externalDatabase.user $extPass .Values.externalDatabase.host (.Values.externalDatabase.port | default 5432) .Values.externalDatabase.database (.Values.externalDatabase.sslmode | default "require") | b64enc | quote }}
  {{- end }}
  {{- if .Values.auth.setupToken }}
  setup-token: {{ .Values.auth.setupToken | b64enc | quote }}
  {{- end }}
  {{- if .Values.alerting.webhookToken }}
  alerting-webhook-token: {{ .Values.alerting.webhookToken | b64enc | quote }}
  {{- else if .Values.alerting.enabled }}
  {{- $existingSecret := lookup "v1" "Secret" .Release.Namespace (include "kubecenter.fullname" .) }}
  {{- if and $existingSecret (index $existingSecret.data "alerting-webhook-token") }}
  alerting-webhook-token: {{ index $existingSecret.data "alerting-webhook-token" }}
  {{- else }}
  alerting-webhook-token: {{ randAlphaNum 32 | b64enc | quote }}
  {{- end }}
  {{- end }}
  {{- if .Values.alerting.smtp.username }}
  smtp-username: {{ .Values.alerting.smtp.username | b64enc | quote }}
  {{- end }}
  {{- if .Values.alerting.smtp.password }}
  smtp-password: {{ .Values.alerting.smtp.password | b64enc | quote }}
  {{- end }}
  {{- if .Values.monitoring.grafana.apiToken }}
  grafana-api-token: {{ .Values.monitoring.grafana.apiToken | b64enc | quote }}
  {{- end }}
  {{- range $i, $provider := .Values.auth.oidc }}
  {{- if $provider.clientSecret }}
  oidc-{{ $provider.id }}-client-secret: {{ $provider.clientSecret | b64enc | quote }}
  {{- end }}
  {{- end }}
  {{- range $i, $provider := .Values.auth.ldap }}
  {{- if $provider.bindPassword }}
  ldap-{{ $provider.id }}-bind-password: {{ $provider.bindPassword | b64enc | quote }}
  {{- end }}
  {{- end }}
