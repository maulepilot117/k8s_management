apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "kubecenter.fullname" . }}-backend
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "kubecenter.labels" . | nindent 4 }}
    app.kubernetes.io/component: backend
spec:
  replicas: {{ .Values.replicaCount }}
  selector:
    matchLabels:
      {{- include "kubecenter.selectorLabels" . | nindent 6 }}
      app.kubernetes.io/component: backend
  template:
    metadata:
      labels:
        {{- include "kubecenter.selectorLabels" . | nindent 8 }}
        app.kubernetes.io/component: backend
    spec:
      serviceAccountName: {{ include "kubecenter.serviceAccountName" . }}
      securityContext:
        runAsNonRoot: true
        runAsUser: 65534
        runAsGroup: 65534
        fsGroup: 65534
        seccompProfile:
          type: RuntimeDefault
      containers:
        - name: backend
          image: "{{ .Values.backend.image.repository }}:{{ .Values.backend.image.tag | default .Chart.AppVersion }}"
          imagePullPolicy: {{ .Values.backend.image.pullPolicy }}
          securityContext:
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: true
            capabilities:
              drop: ["ALL"]
          ports:
            - name: http
              containerPort: {{ .Values.backend.port }}
              protocol: TCP
          envFrom:
            - configMapRef:
                name: {{ include "kubecenter.fullname" . }}-config
          env:
            # Secrets — always from the app Secret
            - name: KUBECENTER_AUTH_JWTSECRET
              valueFrom:
                secretKeyRef:
                  name: {{ include "kubecenter.fullname" . }}
                  key: jwt-secret
            {{- if or .Values.postgresql.enabled .Values.externalDatabase.host }}
            - name: KUBECENTER_DATABASE_URL
              valueFrom:
                secretKeyRef:
                  name: {{ include "kubecenter.fullname" . }}
                  key: database-url
            {{- end }}
            {{- if .Values.auth.setupToken }}
            - name: KUBECENTER_AUTH_SETUPTOKEN
              valueFrom:
                secretKeyRef:
                  name: {{ include "kubecenter.fullname" . }}
                  key: setup-token
            {{- end }}
            {{- if .Values.alerting.enabled }}
            - name: KUBECENTER_ALERTING_WEBHOOKTOKEN
              valueFrom:
                secretKeyRef:
                  name: {{ include "kubecenter.fullname" . }}
                  key: alerting-webhook-token
            {{- if .Values.alerting.smtp.username }}
            - name: KUBECENTER_ALERTING_SMTP_USERNAME
              valueFrom:
                secretKeyRef:
                  name: {{ include "kubecenter.fullname" . }}
                  key: smtp-username
            {{- end }}
            {{- if .Values.alerting.smtp.password }}
            - name: KUBECENTER_ALERTING_SMTP_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: {{ include "kubecenter.fullname" . }}
                  key: smtp-password
            {{- end }}
            {{- end }}
            {{- if .Values.monitoring.grafana.apiToken }}
            - name: KUBECENTER_MONITORING_GRAFANATOKEN
              valueFrom:
                secretKeyRef:
                  name: {{ include "kubecenter.fullname" . }}
                  key: grafana-api-token
            {{- end }}
            {{- range $i, $provider := .Values.auth.oidc }}
            - name: KUBECENTER_AUTH_OIDC_{{ $i }}_ID
              value: {{ $provider.id | quote }}
            - name: KUBECENTER_AUTH_OIDC_{{ $i }}_DISPLAYNAME
              value: {{ $provider.displayName | quote }}
            - name: KUBECENTER_AUTH_OIDC_{{ $i }}_ISSUERURL
              value: {{ $provider.issuerURL | quote }}
            - name: KUBECENTER_AUTH_OIDC_{{ $i }}_CLIENTID
              value: {{ $provider.clientID | quote }}
            {{- if $provider.clientSecret }}
            - name: KUBECENTER_AUTH_OIDC_{{ $i }}_CLIENTSECRET
              valueFrom:
                secretKeyRef:
                  name: {{ include "kubecenter.fullname" $ }}
                  key: oidc-{{ $provider.id }}-client-secret
            {{- end }}
            - name: KUBECENTER_AUTH_OIDC_{{ $i }}_REDIRECTURL
              value: {{ $provider.redirectURL | quote }}
            {{- end }}
            {{- range $i, $provider := .Values.auth.ldap }}
            - name: KUBECENTER_AUTH_LDAP_{{ $i }}_ID
              value: {{ $provider.id | quote }}
            - name: KUBECENTER_AUTH_LDAP_{{ $i }}_DISPLAYNAME
              value: {{ $provider.displayName | quote }}
            - name: KUBECENTER_AUTH_LDAP_{{ $i }}_URL
              value: {{ $provider.url | quote }}
            - name: KUBECENTER_AUTH_LDAP_{{ $i }}_BINDDN
              value: {{ $provider.bindDN | quote }}
            {{- if $provider.bindPassword }}
            - name: KUBECENTER_AUTH_LDAP_{{ $i }}_BINDPASSWORD
              valueFrom:
                secretKeyRef:
                  name: {{ include "kubecenter.fullname" $ }}
                  key: ldap-{{ $provider.id }}-bind-password
            {{- end }}
            - name: KUBECENTER_AUTH_LDAP_{{ $i }}_USERBASEDN
              value: {{ $provider.userBaseDN | quote }}
            - name: KUBECENTER_AUTH_LDAP_{{ $i }}_USERFILTER
              value: {{ $provider.userFilter | quote }}
            {{- end }}
          livenessProbe:
            httpGet:
              path: /healthz
              port: http
            initialDelaySeconds: 5
            periodSeconds: 10
          readinessProbe:
            httpGet:
              path: /readyz
              port: http
            initialDelaySeconds: 5
            periodSeconds: 5
          resources:
            {{- toYaml .Values.backend.resources | nindent 12 }}
