apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: {{ include "kubecenter.fullname" . }}
  labels:
    {{- include "kubecenter.labels" . | nindent 4 }}
rules:
  # Impersonation — allows backend to impersonate users for RBAC enforcement
  - apiGroups: [""]
    resources: ["users", "groups", "serviceaccounts"]
    verbs: ["impersonate"]
  # Read access for informers (service account's own permissions)
  - apiGroups: [""]
    resources:
      - pods
      - pods/log
      - services
      - endpoints
      - configmaps
      # secrets are fetched on-demand via impersonated client, not cached in informer
      - namespaces
      - nodes
      - persistentvolumeclaims
      - persistentvolumes
      - events
      - resourcequotas
      - limitranges
      - serviceaccounts
    verbs: ["get", "list", "watch"]
  - apiGroups: ["apps"]
    resources:
      - deployments
      - replicasets
      - statefulsets
      - daemonsets
    verbs: ["get", "list", "watch"]
  - apiGroups: ["batch"]
    resources:
      - jobs
      - cronjobs
    verbs: ["get", "list", "watch"]
  - apiGroups: ["autoscaling"]
    resources:
      - horizontalpodautoscalers
    verbs: ["get", "list", "watch"]
  - apiGroups: ["policy"]
    resources:
      - poddisruptionbudgets
    verbs: ["get", "list", "watch"]
  - apiGroups: ["discovery.k8s.io"]
    resources:
      - endpointslices
    verbs: ["get", "list", "watch"]
  - apiGroups: ["networking.k8s.io"]
    resources:
      - ingresses
      - networkpolicies
    verbs: ["get", "list", "watch"]
  # RBAC viewer (read-only)
  - apiGroups: ["rbac.authorization.k8s.io"]
    resources:
      - roles
      - clusterroles
      - rolebindings
      - clusterrolebindings
    verbs: ["get", "list", "watch"]
  # Storage — CSI drivers, storage classes (informer-cached, cluster-scoped)
  - apiGroups: ["storage.k8s.io"]
    resources:
      - csidrivers
      - storageclasses
      - csinodes
    verbs: ["get", "list", "watch"]
  # VolumeSnapshot CRDs (dynamic client, conditional on CRD existence)
  - apiGroups: ["snapshot.storage.k8s.io"]
    resources:
      - volumesnapshots
      - volumesnapshotclasses
    verbs: ["get", "list"]
  # API discovery for CNI/CSI CRD detection
  - nonResourceURLs: ["/api", "/api/*", "/apis", "/apis/*"]
    verbs: ["get"]
  # Monitoring discovery — check for Prometheus Operator CRDs and resources
  - apiGroups: ["monitoring.coreos.com"]
    resources: ["servicemonitors", "prometheuses"]
    verbs: ["list", "get"]
  # Admission webhooks (read-only)
  - apiGroups: ["admissionregistration.k8s.io"]
    resources:
      - validatingwebhookconfigurations
      - mutatingwebhookconfigurations
    verbs: ["get", "list", "watch"]
  # SelfSubjectAccessReview for RBAC filtering
  - apiGroups: ["authorization.k8s.io"]
    resources: ["selfsubjectaccessreviews"]
    verbs: ["create"]
