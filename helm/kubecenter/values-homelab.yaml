# Homelab deployment values (k3s ARM64, 3 nodes)
replicaCount: 1

backend:
  image:
    repository: ghcr.io/maulepilot117/k8scenter-backend
    tag: latest
    pullPolicy: Always  # always pull latest on upgrade
  config:
    dev: true  # relaxes rate limiting to 60 req/min for homelab

frontend:
  image:
    repository: ghcr.io/maulepilot117/k8scenter-frontend
    tag: latest
    pullPolicy: Always
  resources:
    requests:
      cpu: 50m
      memory: 128Mi
    limits:
      cpu: 500m
      memory: 512Mi

imagePullSecrets: []
# Packages are public on GHCR — no pull secret needed

auth:
  jwtSecret: "homelab-jwt-secret-for-k8scenter-minimum-32-bytes"
  setupToken: "homelab-setup-token"

service:
  type: LoadBalancer
  port: 8080
  frontendPort: 8000

ingress:
  enabled: false

networkPolicy:
  enabled: false  # Disabled — Cilium NP port-filtering blocks cross-namespace gRPC (Hubble Relay)

postgresql:
  enabled: true
  image:
    tag: latest  # latest has ARM64 support; pinned tags may not
  auth:
    username: k8scenter
    password: "k8sC3nterDB2026"
    database: k8scenter
  primary:
    persistence:
      storageClass: local-path
      size: 5Gi
    podSecurityContext:
      enabled: false
    containerSecurityContext:
      enabled: false
