replicaCount: 1

backend:
  image:
    repository: kubecenter-backend
    tag: ""  # Defaults to appVersion
    pullPolicy: IfNotPresent
  port: 8080
  resources:
    requests:
      cpu: 100m
      memory: 128Mi
    limits:
      cpu: 500m
      memory: 256Mi
  config:
    dev: false
    logLevel: info
    logFormat: json
    clusterID: local

serviceAccount:
  create: true
  name: ""
  annotations: {}

service:
  type: ClusterIP
  port: 8080

ingress:
  enabled: false
  className: ""
  annotations: {}
  hosts: []
  tls: []

monitoring:
  deploy: false
  namespace: ""              # Namespace hint for discovery (empty = search all)
  prometheus:
    url: ""                  # Override auto-discovery
  grafana:
    url: ""                  # Override auto-discovery
    apiToken: ""             # Service account token for dashboard provisioning

# Subchart overrides (only when monitoring.deploy=true)
monitoring-stack:
  alertmanager:
    enabled: false           # KubeCenter handles alerting in Step 11
  grafana:
    enabled: true
    sidecar:
      dashboards:
        enabled: true
        label: grafana_dashboard
    grafana.ini:
      security:
        allow_embedding: true
      auth.proxy:
        enabled: true
        header_name: X-WEBAUTH-USER
  kubeStateMetrics:
    enabled: true
  nodeExporter:
    enabled: true
